# ==============================================================================
#                 ISBNet Configuration for FOR-Instance Dataset
# ==============================================================================
# This configuration is designed for fine-tuning ISBNet on the custom,
# instance-aware pre-processed FOR-Instance dataset.

# ------------------------------------------------------------------------------
#                                   MODEL
# ------------------------------------------------------------------------------
model:
  # --- Core Architecture ---
  channels: 32         # Base channel size for the U-Net backbone. Default is fine.
  num_blocks: 7        # Number of blocks in the U-Net. Default is fine.

  # --- Class Configuration ---
  # CRITICAL: These must match your pre-processed data.
  semantic_classes: 2  # Number of semantic classes. We have Ground (0) and Tree (1).
  instance_classes: 1  # Number of classes that have instances. Only Tree (1) is an instance class.
  sem2ins_classes: []  # Not needed for this setup.
  ignore_label: -100   # This MUST match the ignore label used in your preprocessing (-100).

  # --- Voxelization and Input ---
  # CRITICAL: This must match the value we calculated based on your data.
  voxel_scale: 8       # Calculated as 1 / voxel_size. For a ~12.5cm voxel, scale is 8.
  with_coords: True    # Include raw coordinates as a point feature. Good practice.

  # --- Model Heads and Mechanisms ---
  # It's best to leave these at their default values unless you are an expert.
  semantic_only: False
  semantic_weight: False
  instance_head_cfg:
    num_dyco_layer: 2
    dec_dim: 128
    n_sample_pa1: 2048
    n_queries: 256
    radius_scale: 1
    radius: 0.4
    neighbor: 32
  use_spp_pool: True
  filter_bg_thresh: 0.1
  iterative_sampling: True

  # --- Test-Time Configuration ---
  # These settings control how the model behaves during evaluation/inference.
  test_cfg:
    x4_split: False
    logit_thresh: 0.0     # Threshold for semantic logits to consider a point as foreground.
    score_thresh: 0.2     # Confidence score threshold for keeping a predicted instance.
    npoint_thresh: 100    # Minimum number of points for a predicted instance to be kept.
    type_nms: 'matrix'
    topk: 100

  # --- Fine-tuning Configuration ---
  # List of modules to freeze during fine-tuning. This freezes the backbone.
  fixed_modules: ['input_conv', 'unet', 'output_layer', 'semantic_linear', 'offset_linear', 'offset_vertices_linear', 'box_conf_linear']

# ------------------------------------------------------------------------------
#                                     DATA
# ------------------------------------------------------------------------------
data:
  train:
    # CRITICAL: Specify our new dataset type.
    type: 'forinstance'
    # [ACTION REQUIRED] Update this path to your new dataset directory.
    data_root: '/fred/oz419/brenda/FOR-Instance/unpreprocessed/processed_instance_aware_v2_ground_tree'
    prefix: 'train'      # The subdirectory for the training set.
    suffix: '.pth'       # The file extension of our pre-processed chunks.
    training: True
    repeat: 4            # Multiplies the dataset size per epoch. Good for smaller datasets.

    voxel_cfg:
      scale: 8           # Must match the model's voxel_scale.
      # Max voxel grid size, calculated from our 20x20x40m window size and scale of 8.
      spatial_shape: [160, 160, 320]
      max_npoint: 150000 # Max points per chunk. A safe upper limit.
      min_npoint: 1000   # Chunks with fewer points will be skipped.

  # Use 'val' for validation during training.
  test:
    type: 'forinstance'
    # [ACTION REQUIRED] Update this path to your new dataset directory.
    data_root: '/fred/oz419/brenda/FOR-Instance/unpreprocessed/processed_instance_aware_v2_ground_tree'
    prefix: 'val'        # The subdirectory for the validation set.
    suffix: '.pth'
    training: False
    voxel_cfg:
      scale: 8
      spatial_shape: [160, 160, 320]
      max_npoint: 150000
      min_npoint: 1000

# ------------------------------------------------------------------------------
#                                  DATALOADER
# ------------------------------------------------------------------------------
dataloader:
  train:
    # NOTE: Batch size is highly dependent on GPU memory.
    # Start with a small value (2 or 4) and increase if it doesn't crash.
    batch_size: 2
    num_workers: 8    # Number of CPU cores for loading data. Adjust based on your machine.
  test: # This will be used for the validation dataloader as well
    batch_size: 1        # Standard practice to evaluate one scene at a time.
    num_workers: 8

# ------------------------------------------------------------------------------
#                                  OPTIMIZATION
# ------------------------------------------------------------------------------
optimizer:
  type: 'AdamW'
  lr: 0.0001          # A good starting learning rate for AdamW during fine-tuning.
  weight_decay: 0.0001

# ------------------------------------------------------------------------------
#                                  TRAINING
# ------------------------------------------------------------------------------
epochs: 240          # Total number of epochs to train for.
step_epoch: 50       # Epoch at which to decay the learning rate (if a step scheduler is used).
save_freq: 5         # Save a checkpoint every 5 epochs.

# --- CHECKPOINTING & LOGGING ---
# [ACTION REQUIRED] Update this path to your pre-trained model weights.
pretrain: 'work_dirs/forinstance_job_4651857/best.pth'

# A descriptive name for the output directory where logs and checkpoints will be saved.
work_dir: 'work_dirs/forinstance_v2_finetune'

# --- MISC ---
fp16: False         # Set to True only if your hardware and setup support 16-bit precision training.
save_cfg:
  instance: True     # Make sure instance predictions are saved for evaluation.
  semantic: False
  offset: False