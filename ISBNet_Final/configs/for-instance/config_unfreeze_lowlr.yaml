# ==============================================================================
#                 ISBNet Config: Fine-tuning with Unfrozen Backbone
# ==============================================================================
# This configuration builds on the best previous run by unfreezing the U-Net
# backbone to allow it to adapt to the FOR-Instance dataset.

# Add this new top-level section for reproducibility
class_names: ["ground", "tree"]

# ------------------------------------------------------------------------------
#                                   MODEL
# ------------------------------------------------------------------------------
model:
  # --- Core Architecture (no changes) ---
  channels: 32
  num_blocks: 7

  # --- Class Configuration (no changes) ---
  semantic_classes: 2
  instance_classes: 1
  sem2ins_classes: []
  ignore_label: -100

  # --- Voxelization and Input (no changes) ---
  voxel_scale: 8
  with_coords: True

  # --- Model Heads and Mechanisms (no changes) ---
  semantic_only: False
  semantic_weight: False
  instance_head_cfg:
    num_dyco_layer: 2
    dec_dim: 128
    n_sample_pa1: 2048
    n_queries: 256
    radius_scale: 1
    radius: 0.4
    neighbor: 32
  use_spp_pool: True
  filter_bg_thresh: 0.1
  iterative_sampling: True

  # --- Test-Time Configuration (no changes) ---
  test_cfg:
    x4_split: False
    logit_thresh: 0.0
    score_thresh: 0.2
    npoint_thresh: 100
    type_nms: 'matrix'
    topk: 100

  # =================================================================
  # THE KEY CHANGE IS HERE:
  # We are unfreezing the U-Net backbone to allow for end-to-end fine-tuning.
  # The initial point-wise heads remain frozen as they provide stable guidance.
  # =================================================================
  fixed_modules: ['input_conv', 'output_layer', 'semantic_linear', 'offset_linear', 'offset_vertices_linear', 'box_conf_linear']

# ------------------------------------------------------------------------------
#                                     DATA
# ------------------------------------------------------------------------------
# Data configuration remains the same as your best run.
data:
  train:
    type: 'forinstance'
    data_root: '/fred/oz419/brenda/FOR-Instance/unpreprocessed/processed_instance_aware_v2_ground_tree'
    prefix: 'train'
    suffix: '.pth'
    training: True
    repeat: 4
    voxel_cfg:
      scale: 8
      spatial_shape: [160, 160, 320]
      max_npoint: 150000
      min_npoint: 1000
  test:
    type: 'forinstance'
    data_root: '/fred/oz419/brenda/FOR-Instance/unpreprocessed/processed_instance_aware_v2_ground_tree'
    prefix: 'val'
    suffix: '.pth'
    training: False
    voxel_cfg:
      scale: 8
      spatial_shape: [160, 160, 320]
      max_npoint: 150000
      min_npoint: 1000

# ------------------------------------------------------------------------------
#                                  DATALOADER
# ------------------------------------------------------------------------------
# Dataloader configuration remains the same.
dataloader:
  train:
    batch_size: 2
    num_workers: 8
  test:
    batch_size: 1
    num_workers: 8

# ------------------------------------------------------------------------------
#                                  OPTIMIZATION
# ------------------------------------------------------------------------------
# We use the proven, stable, low learning rate for this fine-tuning stage.
optimizer:
  type: 'AdamW'
  lr: 0.00001
  weight_decay: 0.0001

# ------------------------------------------------------------------------------
#                                  TRAINING
# ------------------------------------------------------------------------------
# Training configuration remains the same.
epochs: 240
step_epoch: 50
save_freq: 5

# =================================================================
# ANOTHER KEY CHANGE:
# We start from the best model achieved WITH the frozen backbone.
# [ACTION REQUIRED] Please confirm this is the correct job ID for the "pink line" run.
# =================================================================
pretrain: 'work_dirs/forinstance_job_4653293/best.pth'

# A new, descriptive name for this experiment's output directory.
work_dir: 'work_dirs/forinstance_v3_unfrozen_backbone'

# --- MISC ---
# Adding the missing keys for test.py to prevent future crashes.
fp16: False
save_cfg:
  instance: True
  semantic: False
  offset: False
  object_conditions: False
  offset_vertices: False